name: ci
on: [push, pull_request]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-dev.txt
      - run: ruff check app tests
      - run: black --check app tests
      - run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Must ship npm 11: `npm ci` under npm 10 (which Node 20 and 22 bundle)
          # rejects this lockfile — it wants vitest's nested esbuild pinned, and
          # npm 11 records that tree differently and strips the entry on every
          # install. Anything older than 24 fails before a single test runs.
          # 24 also satisfies jsdom's ^20.19 || ^22.13 || >=24 engine range.
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
